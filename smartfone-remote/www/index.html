<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
    <meta name="theme-color" content="#17110d" />
    <title>Agent Remote</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Pairing screen -->
    <section id="pair" class="screen pair-screen">
      <div class="pair-card">
        <div class="brand">
          <div class="brand-logo">◆</div>
          <h1>Agent Remote</h1>
        </div>
        <p class="sub">No app do PC, abra <b>Controle remoto → Ligar ponte</b> e escaneie o QR.</p>
        <button id="scan" class="btn primary big">
          <span class="btn-ico">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="12" rx="2"/><path d="M8 7l1.5-2h5L16 7"/><circle cx="12" cy="13" r="3"/></svg>
          </span>
          Escanear QR
        </button>
        <p id="pair-error" class="error" hidden></p>
        <button id="toggle-manual" class="link-btn">inserir endereço manualmente</button>
        <div id="manual" class="manual" hidden>
          <label class="field">
            <span>Endereço do PC</span>
            <input id="addr" type="text" inputmode="url" autocapitalize="off" autocomplete="off"
              placeholder="192.168.0.10:8765" />
          </label>
          <label class="field">
            <span>Token</span>
            <input id="token" type="text" autocapitalize="off" autocomplete="off" placeholder="ex: ab12cd" />
          </label>
          <button id="connect" class="btn primary">Conectar</button>
        </div>
      </div>
      <p class="pair-foot">Mantém o app conectado à última sessão automaticamente.</p>
    </section>

    <!-- Camera QR scanner overlay -->
    <div id="scanner" class="scanner" hidden>
      <!-- Live feed is drawn frame-by-frame onto this canvas. The <video> stays
           a tiny hidden source so the WebView never promotes it to a native
           surface that would swallow taps on the controls. -->
      <canvas id="scan-view" class="scan-view"></canvas>
      <video id="video" class="scan-src" autoplay playsinline muted webkit-playsinline></video>
      <div class="scan-mask"><div class="scan-frame"></div></div>
      <p class="scan-hint">Aponte a câmera para o QR exibido no PC</p>
      <button id="scan-cancel" class="btn ghost scan-cancel">Cancelar</button>
    </div>

    <!-- Chat screen -->
    <section id="chat" class="screen" hidden>
      <header class="topbar">
        <button id="menu" class="icon-btn" title="Conversas" aria-label="Conversas">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
        </button>
        <button id="conv-title" class="conv-title" title="Trocar conversa">
          <span id="conv-title-text">Conversa</span><span class="caret">▾</span>
        </button>
        <button id="status" class="status" title="Conexão"><span class="dot"></span><span class="status-text">…</span></button>
      </header>
      <div id="reconnect" class="reconnect-bar" hidden><span class="spinner"></span> reconectando…</div>
      <div id="pull-refresh" class="reconnect-bar" hidden><span class="spinner"></span><span id="pull-refresh-text">Puxe para atualizar</span></div>
      <div id="messages" class="messages"></div>
      <div id="busy" class="busy-bar" hidden><span class="spinner"></span> trabalhando…</div>
      <footer class="composer">
        <button id="jump-bottom" class="jump-bottom" title="Ir para o final" aria-label="Ir para o final" hidden>
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="6 13 12 19 18 13"/></svg>
        </button>
        <div id="preview" class="preview-tray" hidden></div>
        <!-- Model + effort of the CURRENT conversation (mirrors the PC pickers). -->
        <div id="model-bar" class="model-bar" hidden>
          <select id="model-select" class="model-select" aria-label="Modelo"></select>
          <select id="effort-select" class="model-select effort-select" aria-label="Esforço" hidden></select>
        </div>
        <div class="composer-row">
          <button id="attach" class="icon-btn attach-btn" title="Enviar imagem" aria-label="Enviar imagem">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="15" rx="2"/><circle cx="8.5" cy="9.5" r="1.6"/><path d="M21 16l-5-5L5 19"/></svg>
          </button>
          <textarea id="input" rows="1" placeholder="Enviar comando ao Claude…"></textarea>
          <button id="mic" class="icon-btn mic-btn" title="Falar" aria-label="Falar" hidden>
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2.5" width="6" height="11" rx="3"/><path d="M5.5 11a6.5 6.5 0 0 0 13 0"/><line x1="12" y1="17.5" x2="12" y2="21"/><line x1="8.5" y1="21" x2="15.5" y2="21"/></svg>
          </button>
          <button id="send" class="btn send" title="Enviar" aria-label="Enviar">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="6 11 12 5 18 11"/></svg>
          </button>
        </div>
        <input id="file" type="file" accept="image/*" multiple hidden />
      </footer>

      <!-- Connection menu (revealed by tapping the online indicator) -->
      <div id="status-menu" class="popover" hidden>
        <div class="popover-info" id="status-info"></div>
        <button id="open-settings" class="popover-item">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Configurações
        </button>
        <button id="exit" class="popover-item danger">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 4h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-3"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Sair da conexão
        </button>
      </div>

      <!-- Settings panel (Permitir tudo + conexão) -->
      <aside id="settings" class="settings-panel" hidden>
        <header class="settings-top">
          <button id="settings-back" class="icon-btn" title="Voltar" aria-label="Voltar">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          </button>
          <span class="settings-top-title">Configurações</span>
        </header>
        <div class="settings-body">
          <section id="cfg-skip-card" class="cfg-card cfg-switch-card">
            <label class="cfg-switch-row">
              <span class="cfg-switch-text">
                <strong>🔓 Permitir tudo</strong>
                <span class="cfg-desc">Executa todas as ferramentas no PC sem pedir confirmação, em todas as conversas. Aplica na hora — use com cuidado.</span>
              </span>
              <input id="cfg-skip" class="cfg-switch-input" type="checkbox" />
              <span class="cfg-switch-visual" aria-hidden="true"></span>
            </label>
          </section>
          <section class="cfg-card">
            <div class="cfg-card-title">Conexão</div>
            <div class="cfg-row"><span class="cfg-k">Endereço</span><span class="cfg-v" id="cfg-addr">—</span></div>
            <div class="cfg-row"><span class="cfg-k">Token</span><span class="cfg-v" id="cfg-token">—</span></div>
            <button id="cfg-exit" class="cfg-exit">Sair desta conexão</button>
          </section>
        </div>
      </aside>

      <!-- Conversation history (like the PC sidebar) -->
      <aside id="history" class="drawer" hidden>
        <div class="drawer-head">
          <span>Conversas</span>
          <button id="drawer-settings" class="icon-btn drawer-settings" title="Configurações" aria-label="Configurações">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
        </div>
        <div class="hist-search">
          <input id="hist-search-input" type="search" inputmode="search" autocomplete="off"
                 placeholder="Buscar nos meus prompts…" aria-label="Buscar nos meus prompts" />
        </div>
        <div id="history-list" class="history-list"></div>
      </aside>
      <div id="scrim" class="scrim" hidden></div>
    </section>

    <script src="jsqr.js"></script>
    <script src="app.js"></script>
  </body>
</html>
